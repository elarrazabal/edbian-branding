name: Build & Release Edbian Branding .deb

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y dpkg-dev fakeroot curl jq

    - name: Determine version
      run: |
        VERSION=$(echo ${GITHUB_REF_NAME} | sed 's/^v//')
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "Building version: $VERSION"

    - name: Update DEBIAN/control version
      run: |
        sed -i "s/^Version:.*/Version: $VERSION/" DEBIAN/control
        cat DEBIAN/control

    - name: Build .deb package (from repo root)
      run: |
        dpkg-deb --build . edbian-branding.deb
        mv edbian-branding.deb edbian-branding-$VERSION.deb
        ls -lh edbian-branding-$VERSION.deb

    - name: Create or get release
      id: release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Checking release for tag v$VERSION"

        RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/v$VERSION)

        RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')

        if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
          echo "Release does not exist. Creating..."

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"v$VERSION\",
              \"name\": \"v$VERSION\",
              \"draft\": false,
              \"prerelease\": false
            }" \
            https://api.github.com/repos/${GITHUB_REPOSITORY}/releases)

          echo "$RESPONSE"

          RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
        else
          echo "Release already exists: $RELEASE_ID"
        fi

        if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
          echo "ERROR: Release creation failed"
          exit 1
        fi

        echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

    - name: Check if asset already exists
      env:
         GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ "$RELEASE_ID" == "null" ] || [ -z "$RELEASE_ID" ]; then
          echo "ERROR: RELEASE_ID is invalid"
          exit 1
        fi

        ASSET_NAME="edbian-branding-$VERSION.deb"

        RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/$RELEASE_ID/assets)

        echo "$RESPONSE"

        ASSET_ID=$(echo "$RESPONSE" | jq -r ".[] | select(.name==\"$ASSET_NAME\") | .id")

        if [ -z "$ASSET_ID" ] || [ "$ASSET_ID" == "null" ]; then
          echo "ASSET_EXISTS=false" >> $GITHUB_ENV
        else
          echo "ASSET_EXISTS=true" >> $GITHUB_ENV
        fi

    - name: Upload .deb to GitHub Release
      if: env.ASSET_EXISTS == 'false'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        curl -s -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Content-Type: application/octet-stream" \
          --data-binary @edbian-branding-$VERSION.deb \
          "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=edbian-branding-$VERSION.deb"

    - name: Upload artifact (Actions)
      uses: actions/upload-artifact@v4
      with:
        name: edbian-branding-deb
        path: edbian-branding-$VERSION.deb
